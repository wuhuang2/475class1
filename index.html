<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>475班 · 时光相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Text', '微软雅黑', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 16px;
            background-color: #0b2b44;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/wuhuang2/475class1/main/wallpaper.jpg') no-repeat center center/cover;
            filter: brightness(0.95);
            z-index: -2;
        }

        @media (max-width: 600px) {
            body::before {
                background: url('https://raw.githubusercontent.com/wuhuang2/475class1/main/wallpaper.jpg') no-repeat center center/contain;
                background-color: #0b2b44;
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            max-width: 1200px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 20px auto;
        }

        .nav-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 40px;
            font-size: 1em;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.2s;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            text-align: center;
        }

        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
        }

        .breadcrumb a:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .breadcrumb span {
            color: rgba(255, 255, 255, 0.7);
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .folder-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: 0.2s;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: block;
        }

        .folder-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px);
        }

        .folder-icon {
            font-size: 3em;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .folder-name {
            font-size: 1.1em;
            font-weight: 500;
            word-break: break-word;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .folder-count {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .media-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
            cursor: pointer;
        }

        .media-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px);
        }

        .media-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .media-preview img, .media-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0.8;
            pointer-events: none;
        }

        .media-name {
            padding: 10px 12px;
            color: white;
            font-size: 0.9em;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .error-message {
            background: rgba(255, 100, 100, 0.3);
            backdrop-filter: blur(4px);
            padding: 20px;
            border-radius: 30px;
            color: white;
            text-align: center;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-content img, .modal-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .card { padding: 25px 15px; }
            h1 { font-size: 2em; }
            .folder-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="nav-bar">
            <a href="https://tlwz475class.42web.io/" class="nav-link">🏠 班级主页</a>
            <a href="https://tlwz475class.42web.io/school.html" class="nav-link">🏫 学校介绍</a>
            <a href="#" class="nav-link active">📸 时光相册</a>
        </div>

        <h1>📖 475班 · 时光相册</h1>

        <div class="breadcrumb" id="breadcrumb">
            <a href="#" data-path="">📁 根目录</a>
        </div>

        <div id="content-area">
            <div class="loading">加载中，请稍候...</div>
        </div>

        <div style="margin-top: 40px; text-align: center; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.5); font-size: 0.9em; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 10px;">
                <span>屯留五中 475班</span> ｜ 毕业不散场 ｜ 永远在线
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); padding: 6px 18px; border-radius: 40px; width: fit-content; margin: 0 auto;">
                <span>© 2026</span>
                <a href="https://space.bilibili.com/3546734730938563" target="_blank" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 4px;">
                    <span style="width:18px; height:18px; background:white; color:#1e4a6f; border-radius:4px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold;">B</span> @锦云知夏_Glimpse
                </a>
                <span>· 本网站由GitHub pages、InfinityFree 提供免费支持</span>
            </div>
        </div>
    </div>

    <div class="modal" id="previewModal" onclick="closeModal()">
        <div class="modal-close" onclick="closeModal()">×</div>
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        // GitHub 配置 - 直接使用 raw 链接
        const GITHUB_OWNER = 'wuhuang2';
        const GITHUB_REPO = '475class1';
        const GITHUB_BRANCH = 'main';
        const API_BASE = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/`;
        const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;

        // 当前路径
        let currentPath = '';

        // 允许的图片/视频扩展名
        const IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];
        const VIDEO_EXTS = ['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v'];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadPath('');
        });

        // 加载指定路径
        async function loadPath(path) {
            currentPath = path;
            updateBreadcrumb(path);
            
            const contentDiv = document.getElementById('content-area');
            contentDiv.innerHTML = '<div class="loading">加载中，请稍候...</div>';

            try {
                const apiUrl = API_BASE + (path ? path : '');
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }
                
                const data = await response.json();

                // 过滤掉 .gitignore 和本文件自己
                const items = data.filter(item => 
                    item.name !== '.gitignore' && 
                    item.name !== 'index.html' &&
                    item.name !== 'README.md'
                );

                if (items.length === 0) {
                    contentDiv.innerHTML = '<div class="error-message">📁 这个文件夹是空的</div>';
                    return;
                }

                // 分离文件夹和文件
                const folders = items.filter(item => item.type === 'dir');
                const files = items.filter(item => item.type === 'file');

                let html = '';

                // 显示文件夹
                if (folders.length > 0) {
                    html += '<div class="folder-grid">';
                    folders.forEach(folder => {
                        const folderName = folder.name;
                        html += `
                            <a href="#" class="folder-card" onclick="loadPath('${encodeURIComponent(folderName)}'); return false;">
                                <div class="folder-icon">📁</div>
                                <div class="folder-name">${folderName}</div>
                                <div class="folder-count">点击进入</div>
                            </a>
                        `;
                    });
                    html += '</div>';
                }

                // 显示文件
                if (files.length > 0) {
                    html += '<div class="media-grid">';
                    files.forEach(file => {
                        const fileName = file.name;
                        const fileExt = fileName.split('.').pop().toLowerCase();
                        const isImage = IMAGE_EXTS.includes(fileExt);
                        const isVideo = VIDEO_EXTS.includes(fileExt);
                        
                        if (isImage || isVideo) {
                            const rawUrl = `${RAW_BASE}${path ? path + '/' : ''}${encodeURIComponent(fileName)}`;
                            
                            html += `
                                <div class="media-card" onclick="previewMedia('${rawUrl}', '${isVideo ? 'video' : 'image'}')">
                                    <div class="media-preview">
                                        ${isImage ? `<img src="${rawUrl}" alt="${fileName}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23aaa%22%20font-size%3D%2214%22%3E加载失败%3C%2Ftext%3E%3C%2Fsvg%3E'">` 
                                        : `<video src="${rawUrl}#t=1" preload="metadata"></video><span class="video-icon">▶️</span>`}
                                    </div>
                                    <div class="media-name">${fileName}</div>
                                </div>
                            `;
                        }
                    });
                    html += '</div>';
                }

                if (html === '') {
                    html = '<div class="error-message">📁 没有可显示的照片或视频</div>';
                }

                contentDiv.innerHTML = html;
            } catch (error) {
                console.error('加载失败:', error);
                contentDiv.innerHTML = '<div class="error-message">❌ 加载失败，请稍后重试</div>';
            }
        }

        // 更新面包屑导航
        function updateBreadcrumb(path) {
            const breadcrumbDiv = document.getElementById('breadcrumb');
            if (!path) {
                breadcrumbDiv.innerHTML = `<a href="#" data-path="">📁 根目录</a>`;
                return;
            }

            const parts = path.split('/');
            let html = '<a href="#" data-path="">📁 根目录</a>';
            let accumulated = '';
            
            parts.forEach((part, index) => {
                accumulated += (index === 0 ? part : '/' + part);
                html += ` <span>›</span> <a href="#" data-path="${accumulated}">${part}</a>`;
            });

            breadcrumbDiv.innerHTML = html;

            breadcrumbDiv.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const path = link.getAttribute('data-path');
                    loadPath(path);
                });
            });
        }

        // 预览媒体
        function previewMedia(url, type) {
            const modal = document.getElementById('previewModal');
            const modalContent = document.getElementById('modalContent');
            
            if (type === 'image') {
                modalContent.innerHTML = `<img src="${url}" alt="preview">`;
            } else {
                modalContent.innerHTML = `<video src="${url}" controls autoplay></video>`;
            }
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('active');
            document.getElementById('modalContent').innerHTML = '';
            document.body.style.overflow = '';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
